<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic Radio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Majestic Radio">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2d1f4e">
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    
    <style>
        :root {
            --bg-primary: #2d1f4e; --bg-secondary: #3d2a6e; --bg-tertiary: #4a3580;
            --text-primary: #ffffff; --text-secondary: #d4c4e8; --text-muted: #9d8bbd;
            --accent: #7c3aed; --accent-light: #a78bfa; --success: #10b981; --error: #ef4444;
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.4); --border-radius: 16px; --border-radius-lg: 24px;
            --btn-glass: rgba(255, 255, 255, 0.08); --btn-glass-hover: rgba(255, 255, 255, 0.15); --btn-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1030 0%, #2d1f4e 50%, #3d2a6e 100%);
            color: var(--text-primary); min-height: 100vh; min-height: -webkit-fill-available;
            overflow-x: hidden; display: flex; justify-content: center; align-items: flex-start;
        }
        .app-container { width: 100%; max-width: 420px; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        .player-card {
            width: 100%; background: rgba(45, 31, 78, 0.6); backdrop-filter: blur(20px);
            border-radius: var(--border-radius-lg); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px; box-shadow: var(--shadow-lg); position: relative; overflow: hidden;
        }
        .app-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; margin-bottom: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .radio-title { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: 1px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .header-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--btn-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--btn-shadow); position: relative; z-index: 60;
        }
        .header-btn:hover { background: var(--btn-glass-hover); transform: translateY(-1px); border-color: rgba(255, 255, 255, 0.3); }
        .header-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .burger-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--btn-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--btn-shadow); position: relative; z-index: 60;
        }
        .burger-btn:hover { background: var(--btn-glass-hover); transform: translateY(-1px); border-color: rgba(255, 255, 255, 0.3); }
        .burger-btn .burger-line {
            width: 18px; height: 2px; background: var(--text-primary); border-radius: 1px;
            position: absolute; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .burger-btn .burger-line:first-child { transform: translateY(-5px); }
        .burger-btn .burger-line:nth-child(3) { transform: translateY(5px); }
        .burger-btn.active .burger-line:first-child { transform: rotate(45deg); }
        .burger-btn.active .burger-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .burger-btn.active .burger-line:nth-child(3) { transform: rotate(-45deg); }

        .cover-wrapper {
            position: relative; width: 100%; margin-bottom: 24px; border-radius: var(--border-radius);
            overflow: hidden; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5); aspect-ratio: 1;
        }
        .cover-art {
            width: 100%; height: 100%; background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            display: flex; align-items: center; justify-content: center; font-size: 80px;
            background-size: cover; background-position: center; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
            opacity: 1;
        }
        .cover-art.is-fading { opacity: 0.35; }
        .cover-art.playing { animation: pulse-slow 6s ease-in-out infinite; }
        @keyframes pulse-slow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        .viz-canvas-wrapper {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            width: 100%; height: 25%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            background: linear-gradient(to top, rgba(10,5,20,0.95) 0%, rgba(10,5,20,0.6) 30%, transparent 100%);
            border-radius: 0 0 var(--border-radius) var(--border-radius);
            overflow: hidden;
        }
        .viz-canvas-wrapper.active { opacity: 1; }
        #visualizer-canvas {
            width: 100%; height: 100%; display: block;
        }

        .track-info { text-align: center; margin-bottom: 20px; min-height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .track-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); line-height: 1.3; min-height: 32px; transition: opacity 0.2s ease; }
        .track-title.placeholder { opacity: 0.5; }
        .track-artist { font-size: 17px; color: var(--text-secondary); margin-bottom: 12px; font-weight: 400; min-height: 24px; transition: opacity 0.2s ease; }
        .track-artist.placeholder { opacity: 0.5; }
        
        .progress-container { width: 100%; margin-bottom: 24px; min-height: 36px; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; }
        .progress-container.active { opacity: 1; visibility: visible; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 2px; overflow: hidden; position: relative; cursor: default; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 2px; transition: width 0.3s ease; }
        .progress-time { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--text-muted); font-weight: 500; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 32px; }
        .control-btn {
            width: 52px; height: 52px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--btn-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--btn-shadow);
        }
        .control-btn svg { width: 20px; height: 20px; fill: currentColor; transition: transform 0.2s; }
        .control-btn:hover { background: var(--btn-glass-hover); transform: translateY(-2px); }
        .control-btn:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.2); }
        
        .play-btn {
            width: 76px; height: 76px; background: linear-gradient(135deg, rgba(124, 58, 237, 0.8), rgba(167, 139, 250, 0.8));
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); color: white;
            border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-btn svg { width: 28px; height: 28px; fill: white; }
        .play-btn:hover { background: linear-gradient(135deg, rgba(124, 58, 237, 0.95), rgba(167, 139, 250, 0.95)); transform: translateY(-3px) scale(1.05); }
        .play-btn:active { transform: scale(0.95); }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
            border-radius: var(--border-radius-lg); z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 32px 24px; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
            transform: scale(0.95);
        }
        .overlay.open { opacity: 1; visibility: visible; transform: scale(1); }
        .overlay-content { display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 1; pointer-events: auto; }
        .overlay-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .overlay-title svg { width: 20px; height: 20px; fill: var(--accent-light); }
        .overlay-list { width: 100%; display: flex; flex-direction: column; gap: 8px; max-height: 60vh; overflow-y: auto; padding: 4px; }
        .overlay-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px; }

        .station-item {
            width: 100%; padding: 14px 18px; border-radius: 12px; background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-primary); font-size: 14px; cursor: pointer;
            transition: all 0.2s ease; font-family: inherit; font-weight: 500;
            text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .station-item:hover { background: rgba(255, 255, 255, 0.12); }
        .station-item:active { transform: scale(0.98); }
        .station-item.active { background: rgba(124, 58, 237, 0.3); border-color: var(--accent); }
        .station-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
        .station-item.active .station-dot { background: var(--success); box-shadow: 0 0 8px rgba(16, 185, 129, 0.6); }

        .history-item {
            display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease; width: 100%;
        }
        .history-item:hover { background: rgba(255, 255, 255, 0.1); }
        .history-item:active { transform: scale(0.98); }
        .history-item:last-child { opacity: 0.7; }
        
        .history-art {
            width: 48px; height: 48px; border-radius: 8px; flex-shrink: 0;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white; opacity: 0.6;
            background-size: cover; background-position: center;
            overflow: hidden;
        }
        
        .history-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
        .history-track-title { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-track-artist { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
        .history-time svg { width: 12px; height: 12px; fill: var(--text-muted); }
        
        .status-badge { font-size: 11px; padding: 4px 10px; border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: var(--text-muted); display: flex; align-items: center; gap: 4px; font-weight: 500; }
        .status-badge.online { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-badge.error { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        
        @media (max-height: 700px) { .cover-wrapper { max-width: 100%; } .track-title { font-size: 22px; } .app-container { padding: 16px; } }
        @media (max-width: 400px) { .play-btn { width: 68px; height: 68px; } .controls { gap: 20px; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="player-card">
            <header class="app-header">
                <div class="logo"><h1 class="radio-title">MAJESTIC RADIO</h1></div>
                <div class="header-right">
                    <div class="status-badge" id="status-badge"><span>Оффлайн</span></div>
                    <button class="header-btn" id="history-btn" title="История треков">
                        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                    </button>
                    <button class="burger-btn" id="burger-btn" title="Станции">
                        <span class="burger-line"></span><span class="burger-line"></span><span class="burger-line"></span>
                    </button>
                </div>
            </header>
            <div class="cover-wrapper">
                <div class="cover-art" id="cover-art"></div>
                <div class="viz-canvas-wrapper" id="visualizer-container">
                    <canvas id="visualizer-canvas"></canvas>
                </div>
            </div>
            <div class="track-info">
                <h2 class="track-title placeholder" id="track-title">—</h2>
                <p class="track-artist placeholder" id="track-artist">—</p>
            </div>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <div class="progress-time"><span id="progress-current">0:00</span><span id="progress-duration">0:00</span></div>
            </div>
            <div class="controls">
                <button class="control-btn" id="prev-btn" title="Предыдущая станция"><svg viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 19V5h2v14H5z"/></svg></button>
                <button class="control-btn play-btn" id="play-btn" title="Play/Pause">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="next-btn" title="Следующая станция"><svg viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm14 0v16h-2V4h2z"/></svg></button>
            </div>

            <div class="overlay" id="stations-overlay">
                <div class="overlay-content">
                    <div class="overlay-title">📻 Станции</div>
                    <div class="overlay-list" id="stations-list"><div class="overlay-empty">Загрузка станций...</div></div>
                </div>
            </div>

            <div class="overlay" id="history-overlay">
                <div class="overlay-content">
                    <div class="overlay-title">
                        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                        <span>История треков</span>
                    </div>
                    <div class="overlay-list" id="history-list">
                        <div class="overlay-empty" id="history-empty">🎧 Загрузка истории...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player" preload="none" playsinline crossorigin="anonymous"></audio>
    
    <script>
        // ==========================================
        // CONSTELLATION VISUALIZER
        // ==========================================
        let vizAudioCtx = null, vizAnalyser = null, vizSourceNode = null;
        let vizFreqData = null, vizAnimId = null, isVizRunning = false;
        const VIZ_CONFIG = { NUM_NODES: 48, CONN_DISTANCE: 45, FFT_SIZE: 2048, SMOOTHING: 0.75, MAX_FREQ: 10000, NODE_HEIGHT: 0.8, BASE_Y: 0.98 };
        const vizNodes = [];
        for (let vi = 0; vi < VIZ_CONFIG.NUM_NODES; vi++) vizNodes.push({ x: 0, y: 0, energy: 0, targetY: 0 });
        const vizCanvas = document.getElementById('visualizer-canvas');
        const vizCanvasCtx = vizCanvas.getContext('2d');
        const vizContainer = document.getElementById('visualizer-container');
        const radioAudioEl = document.getElementById('audio-player');
        
        function initAudioAnalysis() {
            if (vizAudioCtx) return true;
            try {
                vizAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                vizAnalyser = vizAudioCtx.createAnalyser();
                vizAnalyser.fftSize = VIZ_CONFIG.FFT_SIZE;
                vizAnalyser.smoothingTimeConstant = VIZ_CONFIG.SMOOTHING;
                vizFreqData = new Uint8Array(vizAnalyser.frequencyBinCount);
                if (vizSourceNode) { try { vizSourceNode.disconnect(); } catch(e) {} }
                vizSourceNode = vizAudioCtx.createMediaElementSource(radioAudioEl);
                vizSourceNode.connect(vizAnalyser);
                vizAnalyser.connect(vizAudioCtx.destination);
                return true;
            } catch (e) { return false; }
        }
        
        function drawConstellation() {
            if (!vizCanvasCtx) return;
            const dpr = window.devicePixelRatio || 1;
            const rect = vizCanvas.getBoundingClientRect();
            vizCanvas.width = rect.width * dpr; vizCanvas.height = rect.height * dpr;
            vizCanvasCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            const w = rect.width, h = rect.height;
            vizCanvasCtx.clearRect(0, 0, w, h);
            if (!vizAnalyser || !vizFreqData) { vizAnimId = requestAnimationFrame(drawConstellation); return; }
            vizAnalyser.getByteFrequencyData(vizFreqData);
            const binWidth = vizAudioCtx.sampleRate / vizAnalyser.fftSize;
            const maxFreqBin = Math.min(vizFreqData.length - 1, Math.floor(VIZ_CONFIG.MAX_FREQ / binWidth));
            const vizPadding = 5, drawWidth = w - vizPadding * 2;
            for (let ni = 0; ni < VIZ_CONFIG.NUM_NODES; ni++) {
                const ratio = ni / (VIZ_CONFIG.NUM_NODES - 1);
                const bin = Math.max(0, Math.floor(ratio * maxFreqBin));
                const val = vizFreqData[bin] / 255;
                vizNodes[ni].x = vizPadding + ratio * drawWidth;
                vizNodes[ni].targetY = h * VIZ_CONFIG.BASE_Y - (val * h * VIZ_CONFIG.NODE_HEIGHT);
                vizNodes[ni].y += (vizNodes[ni].targetY - vizNodes[ni].y) * 0.15;
                vizNodes[ni].energy = val;
            }
            vizCanvasCtx.lineWidth = 0.8;
            for (let li = 0; li < VIZ_CONFIG.NUM_NODES; li++) {
                for (let lj = li + 1; lj < VIZ_CONFIG.NUM_NODES; lj++) {
                    const dx = vizNodes[li].x - vizNodes[lj].x, dy = vizNodes[li].y - vizNodes[lj].y, distSq = dx * dx + dy * dy;
                    if (distSq < VIZ_CONFIG.CONN_DISTANCE ** 2) {
                        const dist = Math.sqrt(distSq);
                        const alpha = (1 - dist / VIZ_CONFIG.CONN_DISTANCE) * 0.35 * (0.4 + vizNodes[li].energy + vizNodes[lj].energy);
                        vizCanvasCtx.strokeStyle = `rgba(180,160,255,${Math.max(0, Math.min(1, alpha))})`;
                        vizCanvasCtx.beginPath(); vizCanvasCtx.moveTo(vizNodes[li].x, vizNodes[li].y); vizCanvasCtx.lineTo(vizNodes[lj].x, vizNodes[lj].y); vizCanvasCtx.stroke();
                    }
                }
            }
            for (let pi = 0; pi < VIZ_CONFIG.NUM_NODES; pi++) {
                const n = vizNodes[pi], r = 1.2 + n.energy * 3.5, alpha = 0.4 + n.energy * 0.6;
                vizCanvasCtx.shadowColor = `rgba(167,139,250,${alpha * 0.6})`; vizCanvasCtx.shadowBlur = 6;
                vizCanvasCtx.fillStyle = `rgba(255,255,255,${alpha})`;
                vizCanvasCtx.beginPath(); vizCanvasCtx.arc(n.x, n.y, r, 0, Math.PI * 2); vizCanvasCtx.fill();
                vizCanvasCtx.shadowBlur = 0;
            }
            vizAnimId = requestAnimationFrame(drawConstellation);
        }
        function startVisualizer() {
            vizContainer.classList.add('active');
            if (!initAudioAnalysis()) return;
            if (vizAudioCtx.state === 'suspended') vizAudioCtx.resume().catch(() => {});
            if (!isVizRunning) { isVizRunning = true; cancelAnimationFrame(vizAnimId); drawConstellation(); }
        }
        function stopVisualizer() {
            vizContainer.classList.remove('active'); isVizRunning = false; cancelAnimationFrame(vizAnimId);
            if (vizCanvasCtx) { const rect = vizCanvas.getBoundingClientRect(); vizCanvasCtx.clearRect(0, 0, rect.width, rect.height); }
        }
        function vizCleanup() {
            stopVisualizer();
            if (vizSourceNode) { try { vizSourceNode.disconnect(); } catch(e) {} vizSourceNode = null; }
            if (vizAnalyser) { try { vizAnalyser.disconnect(); } catch(e) {} vizAnalyser = null; }
            if (vizAudioCtx && vizAudioCtx.state !== 'closed') { vizAudioCtx.close().catch(() => {}); vizAudioCtx = null; }
        }
        function vizResizeCanvas() { if (!vizCanvasCtx) return; const dpr = window.devicePixelRatio || 1; const rect = vizCanvas.getBoundingClientRect(); vizCanvas.width = rect.width * dpr; vizCanvas.height = rect.height * dpr; }
        window.addEventListener('resize', vizResizeCanvas); vizResizeCanvas();
        
        // ==========================================
        // RADIO CORE & HISTORY
        // ==========================================
        const BASE_URL = 'https://majesticradio.duckdns.org';
        const HARDCODED_STREAMS = {
            liquid_drum: { name: 'Liquid Drum', stream: `${BASE_URL}/listen/liquid_drum/liquiddrum.mp3` },
            drum_bass: { name: 'Drum & Bass', stream: `${BASE_URL}/listen/drum_bass/drumnbass.mp3` },
            psy_chill: { name: 'Psy Chill', stream: `${BASE_URL}/listen/psy_chill/psychill.mp3` },
            old_goa: { name: 'Old Goa', stream: `${BASE_URL}/listen/old_goa/oldgoa.mp3` },
            progressive_psytrance: { name: 'Progressive Psy', stream: `${BASE_URL}/listen/progressive_psytrance/psyprog.mp3` },
            psy_tech: { name: 'Psy Tech', stream: `${BASE_URL}/listen/psy_tech/psytech.mp3` },
            dark_room: { name: 'Dark Room', stream: `${BASE_URL}/listen/dark_room/darkroot.mp3` }
        };
        const DEFAULT_COVER_SVG = "";

        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn'), prevBtn = document.getElementById('prev-btn'), nextBtn = document.getElementById('next-btn');
        const burgerBtn = document.getElementById('burger-btn'), stationsOverlay = document.getElementById('stations-overlay');
        const stationsListEl = document.getElementById('stations-list'), coverArt = document.getElementById('cover-art');
        const trackTitleEl = document.getElementById('track-title'), trackArtistEl = document.getElementById('track-artist');
        const statusBadge = document.getElementById('status-badge'), progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill'), progressCurrent = document.getElementById('progress-current'), progressDuration = document.getElementById('progress-duration');
        const playIcon = document.getElementById('play-icon'), pauseIcon = document.getElementById('pause-icon');
        const historyBtn = document.getElementById('history-btn'), historyOverlay = document.getElementById('history-overlay');
        const historyList = document.getElementById('history-list'), historyEmpty = document.getElementById('history-empty');

        let stations = {}, currentStationKey = null, isPlaying = false, playbackStarted = false;
        let metadataInterval = null, progressInterval = null, errorTimeout = null;
        let trackData = { duration: 0, elapsed: 0, lastUpdate: 0 };
        let stationsOpen = false, historyOpen = false;
        // Хранилище истории: { stationId: [ {title, artist, art, time} ] }
        let stationHistories = {};
        // Флаг загрузки истории для каждой станции
        let stationHistoryLoaded = {};
        let lastCoverUrl = '';

        function formatTime(seconds) { if (!seconds || seconds < 0) return '0:00'; return `${Math.floor(seconds / 60)}:${Math.floor(seconds % 60).toString().padStart(2, '0')}`; }
        function formatTimeAgo(ts) { 
            if (!ts) return '';
            const diff = Date.now() - ts; 
            const mins = Math.floor(diff / 60000); 
            if (mins < 1) return 'Только что'; 
            if (mins < 60) return `${mins} мин назад`; 
            return `${Math.floor(mins / 60)} ч назад`; 
        }
        function updateStatus(on) { statusBadge.classList.remove('online', 'error'); if (on) { statusBadge.classList.add('online'); statusBadge.innerHTML = '<span>В эфире</span>'; } else statusBadge.innerHTML = '<span>Оффлайн</span>'; }
        function initPlaceholders() { trackTitleEl.classList.add('placeholder'); trackArtistEl.classList.add('placeholder'); }
        function resolveArtUrl(art) { if (!art?.trim()) return DEFAULT_COVER_SVG; return art.startsWith('http') ? art : BASE_URL + art; }

        // Загрузка списка станций
        async function loadStationsFromAPI() {
            try {
                const ctrl = new AbortController();
                setTimeout(() => ctrl.abort(), 5000);
                const res = await fetch(`${BASE_URL}/api/stations`, { signal: ctrl.signal });
                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                const arr = Array.isArray(data) ? data : data.stations || [];
                if (arr.length === 0) throw new Error('No stations');
                
                stations = {}; stationHistories = {}; stationHistoryLoaded = {};
                arr.forEach(st => {
                    const id = st.shortcode || st.short_name || st.slug || st.name?.toLowerCase().replace(/\s+/g, '_');
                    if (!id) return;
                    let streamUrl = st.mounts?.length ? st.mounts[0].url : (st.url || `${BASE_URL}/listen/${id}/${id}.mp3`);
                    stations[id] = { name: st.name, stream: streamUrl, api: `${BASE_URL}/api/nowplaying/${id}`, art: DEFAULT_COVER_SVG };
                    stationHistories[id] = [];
                    stationHistoryLoaded[id] = false;
                });
                if (Object.keys(stations).length > 0) {
                    if (!currentStationKey) currentStationKey = Object.keys(stations)[0];
                    renderStationsList(); setCoverArt(DEFAULT_COVER_SVG);
                    return true;
                }
            } catch (e) { console.log('📻 Stations API fallback:', e.message); }
            return false;
        }

        // Фоллбэк станции (хардкод)
        function initFallbackStations() {
            stations = {}; stationHistories = {}; stationHistoryLoaded = {};
            Object.entries(HARDCODED_STREAMS).forEach(([id, st]) => {
                stations[id] = { name: st.name, stream: st.stream, api: `${BASE_URL}/api/nowplaying/${id}`, art: DEFAULT_COVER_SVG };
                stationHistories[id] = [];
                stationHistoryLoaded[id] = false;
            });
            if (!currentStationKey) currentStationKey = Object.keys(stations)[0];
            renderStationsList(); setCoverArt(DEFAULT_COVER_SVG);
        }

        // Загрузка текущего статуса для ВСЕХ станций (PREFETCHING)
        async function loadNowPlayingForAll() {
            const keys = Object.keys(stations);
            if (keys.length === 0) return;

            await Promise.all(keys.map(async (sid) => {
                try {
                    const ctrl = new AbortController();
                    setTimeout(() => ctrl.abort(), 3000);
                    const res = await fetch(`${stations[sid].api}?r=${Math.random()}`, { signal: ctrl.signal });
                    if (!res.ok) return;
                    const data = await res.json();
                    
                    let artUrl = DEFAULT_COVER_SVG;
                    if (data.now_playing?.song?.art?.trim()) artUrl = resolveArtUrl(data.now_playing.song.art);
                    else if (data.station?.front_art?.trim()) artUrl = resolveArtUrl(data.station.front_art);
                    stations[sid].art = artUrl;
                    if (data.station?.name) stations[sid].name = data.station.name;
                    if (sid === currentStationKey) setCoverArt(artUrl);
                    
                    // Загружаем историю из API для каждой станции
                    parseAndSaveHistory(sid, data);
                    stationHistoryLoaded[sid] = true;

                } catch (e) { 
                    console.warn(`Failed to load info for ${sid}`, e); 
                }
            }));
        }

        // Парсинг и сохранение истории из ответа API
        function parseAndSaveHistory(stationId, data) {
            // AzuraCast может возвращать историю в разных местах:
            // 1. now_playing.history (для текущей станции)
            // 2. song_history (для других станций через отдельный эндпоинт)
            // 3. now_playing.song.history
            
            let rawHistory = [];
            
            // Пробуем разные пути для получения истории
            if (data.now_playing?.history && Array.isArray(data.now_playing.history)) {
                rawHistory = data.now_playing.history;
            } else if (data.song_history && Array.isArray(data.song_history)) {
                rawHistory = data.song_history;
            } else if (data.now_playing?.song?.history && Array.isArray(data.now_playing.song.history)) {
                rawHistory = data.now_playing.song.history;
            }
            
            const parsedHist = [];
            const maxItems = Math.min(rawHistory.length, 5);
            
            for (let i = 0; i < maxItems; i++) {
                const entry = rawHistory[i];
                const songData = entry.song || entry; 
                
                // Вычисляем время
                let time;
                if (entry.played_at) {
                    time = entry.played_at * 1000; // Unix timestamp в миллисекунды
                } else if (entry.timestamp) {
                    time = entry.timestamp * 1000;
                } else {
                    time = Date.now() - (i + 1) * 180000; // Fallback: ~3 мин назад
                }
                
                parsedHist.push({
                    title: songData.title || 'Unknown Track',
                    artist: songData.artist || 'Unknown Artist',
                    art: resolveArtUrl(songData.art),
                    time: time
                });
            }
            
            stationHistories[stationId] = parsedHist;
        }

        // Принудительная загрузка истории для конкретной станции
        async function loadStationHistory(stationId) {
            if (stationHistoryLoaded[stationId]) return;
            
            try {
                const ctrl = new AbortController();
                setTimeout(() => ctrl.abort(), 5000);
                
                // Запрашиваем историю специально для этой станции
                const res = await fetch(`${stations[stationId].api}?r=${Math.random()}`, { signal: ctrl.signal });
                if (!res.ok) return;
                const data = await res.json();
                
                parseAndSaveHistory(stationId, data);
                stationHistoryLoaded[stationId] = true;
                
                // Если история открыта для этой станции - обновляем UI
                if (historyOpen && stationId === currentStationKey) {
                    renderCurrentHistory();
                }
            } catch (e) {
                console.warn(`Failed to load history for ${stationId}`, e);
            }
        }

        function renderStationsList() {
            if (!stationsListEl) return;
            const keys = Object.keys(stations);
            if (keys.length === 0) { stationsListEl.innerHTML = '<div class="overlay-empty">Нет станций</div>'; return; }
            stationsListEl.innerHTML = '';
            keys.forEach((key) => {
                const st = stations[key];
                const btn = document.createElement('button');
                btn.className = `station-item${key === currentStationKey ? ' active' : ''}`;
                btn.innerHTML = `<span class="station-dot"></span><span>${st.name}</span>`;
                btn.addEventListener('click', (e) => { e.stopPropagation(); switchStation(key, true); closeStations(); });
                stationsListEl.appendChild(btn);
            });
        }

        function openStations() { if (historyOpen) closeHistory(); stationsOpen = true; stationsOverlay.classList.add('open'); burgerBtn.classList.add('active'); }
        function closeStations() { stationsOpen = false; stationsOverlay.classList.remove('open'); burgerBtn.classList.remove('active'); }
        function toggleStations() { stationsOpen ? closeStations() : openStations(); }
        
        function switchStation(key, autoPlay = true) {
            const st = stations[key]; if (!st) return;
            playbackStarted = false; 
            currentStationKey = key; 
            stopPlayback(); 
            setCoverArt(st.art); 
            renderStationsList();
            
            // Если история открыта - загружаем историю для новой станции и обновляем UI
            if (historyOpen) {
                renderCurrentHistory();
                loadStationHistory(key); // Загружаем если ещё не загружена
            }
            
            if (autoPlay) startPlayback(st);
        }

        function setCoverArt(artUrl) {
            if (!coverArt) return;
            if ((artUrl || '') === lastCoverUrl) return;
            lastCoverUrl = artUrl || '';

            const applyGradientFallback = () => {
                coverArt.style.backgroundImage = '';
            };

            if (!artUrl || !artUrl.trim()) {
                coverArt.classList.add('is-fading');
                requestAnimationFrame(() => {
                    applyGradientFallback();
                    setTimeout(() => coverArt.classList.remove('is-fading'), 120);
                });
                return;
            }

            const img = new Image();
            img.onload = () => {
                coverArt.classList.add('is-fading');
                setTimeout(() => {
                    coverArt.style.backgroundImage = `url('${artUrl}')`;
                    coverArt.classList.remove('is-fading');
                }, 120);
            };
            img.onerror = () => {
                coverArt.classList.add('is-fading');
                setTimeout(() => {
                    applyGradientFallback();
                    coverArt.classList.remove('is-fading');
                }, 120);
            };
            img.src = artUrl;
        }

        function startPlayback(st) {
            playbackStarted = false; audio.src = `${st.stream}?t=${Date.now()}`;
            setTimeout(async () => {
                try {
                    await audio.play(); isPlaying = true; playbackStarted = true;
                    updatePlayButton(); startVisualizer(); updateStatus(true);
                    errorTimeout && (clearTimeout(errorTimeout), errorTimeout = null);
                    fetchMetadata(st.api);
                    metadataInterval && clearInterval(metadataInterval);
                    metadataInterval = setInterval(() => fetchMetadata(st.api), 10000);
                } catch (e) { updateStatus(false); }
            }, 150);
        }
        function stopPlayback() {
            audio.pause(); audio.src = ''; isPlaying = false; playbackStarted = false; updatePlayButton();
            stopVisualizer(); stopProgressAnimation(); updateStatus(false);
            metadataInterval && (clearInterval(metadataInterval), metadataInterval = null);
            errorTimeout && (clearTimeout(errorTimeout), errorTimeout = null);
            trackData = { duration: 0, elapsed: 0, lastUpdate: 0 };
        }
        function togglePlay() { currentStationKey && stations[currentStationKey] && (isPlaying ? stopPlayback() : startPlayback(stations[currentStationKey])); }
        function updatePlayButton() { playIcon.style.display = isPlaying ? 'none' : 'block'; pauseIcon.style.display = isPlaying ? 'block' : 'none'; coverArt.classList.toggle('playing', isPlaying); }

        // Получение метаданных (обновляет историю в реальном времени)
        async function fetchMetadata(apiUrl) {
            if (!isPlaying || !currentStationKey) return;
            try {
                const res = await fetch(`${apiUrl}?r=${Math.random()}`, { cache: 'no-store' });
                if (!res.ok) return;
                const data = await res.json();
                const song = data?.now_playing?.song;
                const { duration, elapsed } = data?.now_playing || {};
                
                if (song) {
                    const title = song.title || 'Unknown Track';
                    const artist = song.artist || 'Unknown Artist';
                    const art = resolveArtUrl(song.art);
                    
                    trackTitleEl.textContent = title; 
                    trackArtistEl.textContent = artist;
                    trackTitleEl.classList.remove('placeholder'); 
                    trackArtistEl.classList.remove('placeholder');
                    setCoverArt(art);

                    // Обновляем историю в памяти
                    addToStationHistory(currentStationKey, title, artist, art);
                }
                
                if (duration && elapsed !== undefined) { 
                    trackData = { duration, elapsed, lastUpdate: Date.now() }; 
                    updateProgress(elapsed, duration); 
                    startProgressAnimation(); 
                }
            } catch (e) {}
        }

        function updateProgress(elapsed, duration) {
            if (!duration || duration <= 0) return void progressContainer.classList.remove('active');
            progressContainer.classList.add('active');
            progressFill.style.width = `${Math.min(100, Math.max(0, (elapsed / duration) * 100))}%`;
            progressCurrent.textContent = formatTime(elapsed); progressDuration.textContent = formatTime(duration);
        }
        function startProgressAnimation() { progressInterval && clearInterval(progressInterval); progressInterval = setInterval(() => { if (!isPlaying || !trackData.duration) return; const el = trackData.elapsed + (Date.now() - trackData.lastUpdate) / 1000; el < trackData.duration && updateProgress(el, trackData.duration); }, 500); }
        function stopProgressAnimation() { progressInterval && (clearInterval(progressInterval), progressInterval = null); progressContainer.classList.remove('active'); }

        // Логика добавления трека в историю конкретной станции
        function addToStationHistory(stationId, title, artist, art) {
            if (!stationId || !title || title === 'Unknown Track') return;
            
            const hist = stationHistories[stationId] || [];
            
            // Не добавляем дубликат
            if (hist.length > 0 && hist[0].title === title && hist[0].artist === artist) return;
            
            hist.unshift({ 
                title, 
                artist: artist || 'Unknown Artist', 
                art: art || DEFAULT_COVER_SVG, 
                time: Date.now() 
            });
            
            if (hist.length > 5) hist.length = 5;
            stationHistories[stationId] = hist;
            
            // Если история открыта для этой станции - перерисовываем
            if (historyOpen && stationId === currentStationKey) {
                renderCurrentHistory();
            }
        }
        
        // Отрисовка истории для ТЕКУЩЕЙ выбранной станции
        function renderCurrentHistory() {
            if (!currentStationKey) return;
            
            const hist = stationHistories[currentStationKey] || [];
            
            // Очищаем список
            historyList.querySelectorAll('.history-item').forEach(el => el.remove());
            
            if (hist.length === 0) { 
                historyEmpty.style.display = 'block';
                return; 
            }
            
            historyEmpty.style.display = 'none';
            
            hist.forEach((t, i) => {
                const item = document.createElement('div'); 
                item.className = 'history-item';
                
                const artStyle = t.art && t.art !== DEFAULT_COVER_SVG ? `background-image:url('${t.art}')` : '';
                const artEmoji = '';
                
                item.innerHTML = `
                    <div class="history-art" style="${artStyle}">${artEmoji}</div>
                    <div class="history-info">
                        <div class="history-track-title">${t.title}</div>
                        <div class="history-track-artist">${t.artist}</div>
                    </div>
                    <div class="history-time">
                        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                        <span>${formatTimeAgo(t.time)}</span>
                    </div>`;
                historyList.appendChild(item);
            });
        }
        
        function openHistory() { 
            if (stationsOpen) closeStations(); 
            historyOpen = true; 
            
            // Показываем "Загрузка" если история ещё не загружена
            if (!stationHistoryLoaded[currentStationKey] || stationHistories[currentStationKey].length === 0) {
                historyEmpty.style.display = 'block';
                historyEmpty.textContent = '🎧 Загрузка истории...';
                historyList.querySelectorAll('.history-item').forEach(el => el.remove());
            } else {
                renderCurrentHistory();
            }
            
            historyOverlay.classList.add('open');
            
            // Загружаем историю с сервера если ещё не загружена
            if (!stationHistoryLoaded[currentStationKey]) {
                loadStationHistory(currentStationKey);
            }
        }
        function closeHistory() { 
            historyOpen = false; 
            historyOverlay.classList.remove('open'); 
        }

        function setupEventListeners() {
            playBtn.addEventListener('click', togglePlay);
            historyBtn.addEventListener('click', (e) => { e.stopPropagation(); if (historyOpen) closeHistory(); else openHistory(); });
            prevBtn.addEventListener('click', () => { const keys = Object.keys(stations); if (!keys.length) return; const idx = keys.indexOf(currentStationKey); switchStation(keys[idx <= 0 ? keys.length - 1 : idx - 1]); });
            nextBtn.addEventListener('click', () => { const keys = Object.keys(stations); if (!keys.length) return; const idx = keys.indexOf(currentStationKey); switchStation(keys[idx >= keys.length - 1 ? 0 : idx + 1]); });
            burgerBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleStations(); });
            stationsOverlay.addEventListener('click', (e) => { e.target === stationsOverlay && closeStations(); });
            historyOverlay.addEventListener('click', (e) => { e.target === historyOverlay && closeHistory(); });
            
            let touchStartX = 0, touchStartY = 0, isSwiping = false;
            [stationsOverlay, historyOverlay].forEach(ov => {
                ov.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; isSwiping = true; }, { passive: true });
                ov.addEventListener('touchend', (e) => { if (!isSwiping) return; isSwiping = false; const dx = e.changedTouches[0].screenX - touchStartX; const dy = e.changedTouches[0].screenY - touchStartY; dy > 80 && Math.abs(dx) < 0.5 * Math.abs(dy) && (ov === stationsOverlay ? closeStations() : closeHistory()); }, { passive: true });
            });
            
            let globalStartX = 0, globalStartY = 0;
            document.addEventListener('touchstart', (e) => { globalStartX = e.changedTouches[0].screenX; globalStartY = e.changedTouches[0].screenY; }, { passive: true });
            document.addEventListener('touchend', (e) => { if (stationsOpen || historyOpen) return; const dx = globalStartX - e.changedTouches[0].screenX; const dy = e.changedTouches[0].screenY - globalStartY; Math.abs(dx) > 50 && Math.abs(dx) > 1.5 * Math.abs(dy) && (dx > 0 ? nextBtn.click() : prevBtn.click()); }, { passive: true });
            
            audio.addEventListener('error', () => {});
            audio.addEventListener('playing', () => { playbackStarted = true; updateStatus(true); errorTimeout && (clearTimeout(errorTimeout), errorTimeout = null); });
        }

        try {
            initPlaceholders(); setupEventListeners(); initFallbackStations();
            loadStationsFromAPI().then(ok => { if (ok) loadNowPlayingForAll(); });
        } catch (e) { console.error("Init Error:", e); }

        if (window.Telegram && window.Telegram.WebApp) { try { const tg = window.Telegram.WebApp; tg.ready(); tg.expand && tg.expand(); } catch (e) {} }
        window.addEventListener('beforeunload', () => { stopPlayback(); vizCleanup(); });
        window.RadioApp = { stations, currentStationKey, switchStation, togglePlay, audio, stationHistories };
    </script>
</body>
</html>
